<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>North Star Support Bot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pine:#1e3a2b;
    --pine-2:#274d38;
    --pine-soft:#e9efe9;
    --pine-line:rgba(30,58,43,.10);
    --gold:#e0a53f;
    --gold-deep:#b97f1e;
    --night:#152230;
    --cream:#f6f2ea;
    --paper:#ffffff;
    --ink:#232a24;
    --muted:#6d766c;
    --agent:#c1483d;
    --agent-soft:#fbeceb;
    --radius:16px;
    --shadow:0 18px 50px -20px rgba(21,34,26,.35);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 15% -10%, #eef3ec 0%, transparent 60%),
      radial-gradient(1000px 700px at 110% 120%, #eceee6 0%, transparent 55%),
      var(--cream);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .app{
    width:100%;max-width:468px;
    height:min(760px,calc(100vh - 48px));
    background:var(--paper);
    border-radius:22px;
    box-shadow:var(--shadow);
    display:flex;flex-direction:column;
    overflow:hidden;
    border:1px solid rgba(30,58,43,.07);
  }

  .top{
    position:relative;
    background:linear-gradient(160deg,#1f3d2c 0%,#16302380 40%,#132635 100%),var(--pine);
    color:var(--cream);
    padding:18px 20px 20px;
    overflow:hidden;
    flex:0 0 auto;
  }
  .topo{position:absolute;inset:0;opacity:.16;pointer-events:none}
  .top-row{position:relative;display:flex;align-items:center;gap:12px}
  .badge{
    width:42px;height:42px;flex:0 0 auto;
    background:rgba(224,165,63,.16);
    border:1px solid rgba(224,165,63,.5);
    border-radius:13px;
    display:flex;align-items:center;justify-content:center;
  }
  .badge svg{width:24px;height:24px;fill:var(--gold)}
  .brand{display:flex;flex-direction:column;line-height:1.1;flex:1;min-width:0}
  .brand h1{
    font-family:"Fraunces",serif;font-weight:600;font-size:20px;margin:0;
    letter-spacing:.2px;color:#fdfbf5;
  }
  .brand .sub{font-size:12.5px;color:#c8d6c6;margin-top:3px;font-weight:400}
  .status{display:flex;align-items:center;gap:6px;font-size:11.5px;color:#bfe0c2;margin-top:6px;font-weight:500}
  .dot{width:7px;height:7px;border-radius:50%;background:#57c07a;box-shadow:0 0 0 3px rgba(87,192,122,.22)}
  .reset{
    position:relative;flex:0 0 auto;
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);
    color:#e7efe6;border-radius:10px;width:34px;height:34px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:background .15s;
  }
  .reset:hover{background:rgba(255,255,255,.16)}
  .reset svg{width:17px;height:17px;stroke:#e7efe6;fill:none;stroke-width:2}

  .hint{
    flex:0 0 auto;
    background:var(--pine-soft);
    color:#3c5343;
    font-size:11.5px;
    padding:8px 20px;
    border-bottom:1px solid var(--pine-line);
    display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  }
  .hint code{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    background:#fff;border:1px solid var(--pine-line);
    padding:1px 6px;border-radius:6px;font-size:11px;color:var(--pine);
  }

  .stream{
    flex:1 1 auto;overflow-y:auto;padding:20px 18px 8px;
    background:
      linear-gradient(var(--paper),var(--paper)) padding-box,
      var(--paper);
    scroll-behavior:smooth;
  }
  .row{display:flex;gap:9px;margin-bottom:14px;align-items:flex-end}
  .row.user{flex-direction:row-reverse}
  .av{
    width:30px;height:30px;flex:0 0 auto;border-radius:9px;
    display:flex;align-items:center;justify-content:center;margin-bottom:2px;
  }
  .av.bot{background:var(--pine);}
  .av.bot svg{width:17px;height:17px;fill:var(--gold)}
  .av.agent{background:var(--agent);color:#fff;font-weight:600;font-size:12px;font-family:"Inter"}
  .bubble-wrap{max-width:78%;display:flex;flex-direction:column}
  .row.user .bubble-wrap{align-items:flex-end}
  .who{font-size:10.5px;color:var(--muted);margin:0 0 3px 4px;font-weight:500;letter-spacing:.2px}
  .row.user .who{display:none}
  .agent-who{color:var(--agent)}
  .bubble{
    padding:10px 13px;border-radius:var(--radius);font-size:14px;line-height:1.5;
    border:1px solid var(--pine-line);background:#fbfaf6;color:var(--ink);
    border-bottom-left-radius:5px;word-wrap:break-word;
  }
  .row.user .bubble{
    background:var(--pine-2);color:#f3f0e8;border-color:transparent;
    border-bottom-left-radius:var(--radius);border-bottom-right-radius:5px;
  }
  .row.agent .bubble{background:var(--agent-soft);border-color:rgba(193,72,61,.18)}
  .bubble strong{font-weight:600}
  .bubble a{color:var(--gold-deep);font-weight:600;text-decoration:underline;text-underline-offset:2px}
  .bubble ul{margin:7px 0 2px;padding-left:18px}
  .bubble li{margin:3px 0}
  .ic-dot{width:11px;height:11px;vertical-align:-1px;margin-right:1px}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 6px 40px}
  .chip{
    display:inline-flex;align-items:center;gap:7px;
    font-family:inherit;font-size:12.5px;font-weight:500;
    background:#fff;color:var(--pine);
    border:1.5px solid rgba(30,58,43,.28);
    padding:7px 13px;border-radius:999px;cursor:pointer;
    transition:background .14s,border-color .14s,transform .08s;
  }
  .chip svg{width:15px;height:15px;flex:0 0 auto}
  .chip:hover{background:var(--pine-soft);border-color:var(--pine)}
  .chip:active{transform:translateY(1px)}
  .chip.agent-exit{border-color:rgba(193,72,61,.4);color:var(--agent)}
  .chip.agent-exit:hover{background:var(--agent-soft)}

  .typing .bubble{padding:12px 14px;display:inline-flex;gap:4px}
  .typing span{width:7px;height:7px;border-radius:50%;background:#a9b3a6;display:inline-block}

  .composer{
    flex:0 0 auto;border-top:1px solid var(--pine-line);
    padding:12px 14px;display:flex;gap:9px;background:#fff;align-items:center;
  }
  .composer input{
    flex:1;font-family:inherit;font-size:14px;color:var(--ink);
    border:1.5px solid rgba(30,58,43,.16);border-radius:999px;
    padding:11px 16px;outline:none;background:#fbfaf6;transition:border-color .15s;
  }
  .composer input::placeholder{color:#9aa398}
  .composer input:focus{border-color:var(--pine)}
  .send{
    width:44px;height:44px;flex:0 0 auto;border:none;cursor:pointer;
    background:var(--pine);border-radius:50%;
    display:flex;align-items:center;justify-content:center;transition:background .15s,transform .08s;
  }
  .send:hover{background:#254a34}
  .send:active{transform:scale(.94)}
  .send svg{width:19px;height:19px;fill:none;stroke:var(--gold);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  :focus-visible{outline:2.5px solid var(--gold);outline-offset:2px}

  .stream::-webkit-scrollbar{width:8px}
  .stream::-webkit-scrollbar-thumb{background:rgba(30,58,43,.16);border-radius:8px}

  @media (prefers-reduced-motion: no-preference){
    .row{animation:pop .28s ease both}
    @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .typing span{animation:blink 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  }
  @media (max-width:520px){
    body{padding:0}
    .app{height:100vh;max-width:100%;border-radius:0;border:none}
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <svg class="topo" viewBox="0 0 468 120" preserveAspectRatio="none" aria-hidden="true">
      <g fill="none" stroke="#ffffff" stroke-width="1.1">
        <path d="M-20 96 C 80 70, 140 118, 240 84 S 420 60, 500 92"/>
        <path d="M-20 74 C 70 52, 150 96, 250 62 S 410 44, 500 70"/>
        <path d="M-20 52 C 90 34, 160 72, 250 44 S 420 28, 500 50"/>
        <path d="M-20 30 C 80 18, 150 48, 250 26 S 420 12, 500 30"/>
      </g>
    </svg>
    <div class="top-row">
      <div class="badge" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 1 L14 10 L23 12 L14 14 L12 23 L10 14 L1 12 L10 10 Z"/></svg>
      </div>
      <div class="brand">
        <h1>North Star Support</h1>
        <div class="sub">Outdoor gear help — orders, returns &amp; more</div>
        <div class="status"><span class="dot"></span> Online now</div>
      </div>
      <button class="reset" id="reset" aria-label="Restart conversation" title="Restart conversation">
        <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
    </div>
  </header>

  <div class="hint">
    <span>Try typing naturally or tap a button.</span>
    <span>Test orders:</span><code>#111</code><code>#222</code><code>#333</code>
  </div>

  <main class="stream" id="stream" aria-live="polite" aria-label="Conversation with North Star Support Bot"></main>

  <div class="composer" id="composer">
    <input id="input" type="text" placeholder="Type a message…" aria-label="Type your message" autocomplete="off">
    <button class="send" id="send" type="button" aria-label="Send message">
      <svg viewBox="0 0 24 24"><path d="M4 12h15M13 6l6 6-6 6"/></svg>
    </button>
  </div>
</div>

<script>
function svgIcon(paths){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>';
}
var ICONS = {
  box:       svgIcon('<path d="M21 8l-9-5-9 5v8l9 5 9-5V8z"/><path d="M3 8l9 5 9-5"/><path d="M12 13v9"/>'),
  ret:       svgIcon('<path d="M4 10h11a5 5 0 0 1 0 10h-4"/><path d="M9 5L4 10l5 5"/>'),
  truck:     svgIcon('<path d="M1 5h11v10H1z"/><path d="M12 8h4l3 3v4h-7z"/><circle cx="5" cy="17" r="1.7"/><circle cx="16.5" cy="17" r="1.7"/>'),
  compass:   svgIcon('<circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-2.5 6-6 2.5 2.5-6z"/>'),
  headset:   svgIcon('<path d="M4 14v-2a8 8 0 0 1 16 0v2"/><rect x="2.5" y="13.5" width="4" height="6.5" rx="1.6"/><rect x="17.5" y="13.5" width="4" height="6.5" rx="1.6"/><path d="M20 20a4 4 0 0 1-4 3h-3"/>'),
  back:      svgIcon('<path d="M20 12H5"/><path d="M12 19l-7-7 7-7"/>'),
  mountains: svgIcon('<path d="M2 20l7-13 4 7 2-3 7 9z"/>'),
  tent:      svgIcon('<path d="M12 4L3 20h18z"/><path d="M12 4v16"/><path d="M9 20l3-5 3 5"/>'),
  snow:      svgIcon('<path d="M12 3v18"/><path d="M4.5 7.5l15 9"/><path d="M19.5 7.5l-15 9"/><path d="M9.5 3.5L12 6l2.5-2.5"/><path d="M9.5 20.5L12 18l2.5 2.5"/>'),
  rain:      svgIcon('<path d="M7 14a4 4 0 0 1-.5-8 5 5 0 0 1 9.5-1A3.5 3.5 0 0 1 17 14H7z"/><path d="M8 17v2"/><path d="M12 17v3"/><path d="M16 17v2"/>'),
  sun:       svgIcon('<circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/>'),
  cloud:     svgIcon('<path d="M7 18a4.5 4.5 0 0 1-.5-9 5.5 5.5 0 0 1 10.5-1A4 4 0 0 1 17.5 18H7z"/>'),
  check:     svgIcon('<path d="M20 6L9 17l-5-5"/>'),
  alert:     svgIcon('<path d="M12 3.5L22 20H2z"/><path d="M12 9.5v4.5"/><path d="M12 17.2h.01"/>'),
  refresh:   svgIcon('<path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/>')
};
var DOT = '<svg class="ic-dot" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" fill="#c1483d"/></svg>';

var ORDERS = {
  '111': 'Order <strong>#111</strong> &rarr; <strong>Shipped, arriving tomorrow.</strong>',
  '222': 'Order <strong>#222</strong> &rarr; <strong>Processing, ships in 24 hours.</strong>',
  '333': 'Order <strong>#333</strong> &rarr; <strong>Delivered.</strong>'
};
var RETURNS_LINK = 'https://www.northstaroutdoors.com/returns';

var INTENTS = {
  track:     ['track','tracking','order','orders','package','packages','parcel','shipment','shipped','arriving','arrive','arrived','locate','status','where',
              'where is my order','wheres my order','where is my','wheres my','my order','order status','track my','my package','my stuff','my parcel','track order','check my order'],
  returns:   ['return','returns','refund','refunds','exchange','exchanges','warranty','defective','returning',
              'send back','send it back','money back','return policy','give it back','bring back'],
  shipping:  ['shipping','ship','expedited','express','standard','fast',
              'how long','delivery time','how fast','when will it','shipping options','how many days','shipping cost','delivery options','ship it'],
  recommend: ['recommend','recommendation','recommendations','suggest','suggestion','suggestions','buy','shopping','browse',
              'looking for','i need','i want','shopping for','which product','help me find','gear for','need gear','what should i buy','product recommendation','recommend a','looking to buy','what do you sell','find me'],
  agent:     ['agent','human','representative','rep',
              'real person','live agent','live chat','talk to someone','speak to someone','speak to a','talk to a','customer service','customer support','help desk','someone real','a human','real human','live person','talk to a person'],
  greeting:  ['hi','hello','hey','howdy','hiya','yo','greetings','good morning','good afternoon','good evening'],
  thanks:    ['thanks','thank','thx','ty','cheers','appreciate','appreciated'],
  menu:      ['menu','options','restart','home','start',
              'main menu','start over','go back','back to menu','what can you do','what do you do','main'],
  bye:       ['bye','goodbye','exit','quit','done',
              'see ya','see you','im done','thats all','no thanks','nothing else','all good','that is all']
};
var PRIO = {agent:7,track:6,returns:6,shipping:5,recommend:4,menu:3,bye:3,greeting:2,thanks:2};

var MAIN_CHIPS = [
  {icon:'box',     label:'Track my order',          value:'track my order'},
  {icon:'ret',     label:'Returns & exchanges',     value:'returns and exchanges'},
  {icon:'truck',   label:'Shipping info',           value:'shipping info'},
  {icon:'compass', label:'Product recommendations', value:'product recommendations'},
  {icon:'headset', label:'Talk to a live agent',    value:'talk to a live agent'}
];

var state = 'MAIN';
var fallbackCount = 0;
var recData = {};

var stream = document.getElementById('stream');
var input = document.getElementById('input');

function normalize(s){
  return s.toLowerCase()
    .replace(/[\u2019']/g,'')
    .replace(/[^\w\s#]/g,' ')
    .replace(/#/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}
function extractOrder(norm){
  var m = norm.match(/\b(\d{2,})\b/);
  return m ? m[1] : null;
}
function classify(norm){
  var words = new Set(norm.split(' ').filter(Boolean));
  var best=null, bestScore=0, bestPrio=-1;
  for(var intent in INTENTS){
    var bag = INTENTS[intent], score=0;
    for(var i=0;i<bag.length;i++){
      var kw = bag[i];
      if(kw.indexOf(' ')>-1){ if(norm.indexOf(kw)>-1) score+=kw.length; }
      else { if(words.has(kw)) score+=kw.length; }
    }
    if(score>0){
      var prio = PRIO[intent]||0;
      if(score>bestScore || (score===bestScore && prio>bestPrio)){
        best=intent; bestScore=score; bestPrio=prio;
      }
    }
  }
  return best;
}

var STAR = '<svg viewBox="0 0 24 24"><path d="M12 1 L14 10 L23 12 L14 14 L12 23 L10 14 L1 12 L10 10 Z"/></svg>';
function scrollDown(){ stream.scrollTop = stream.scrollHeight; }
function clearChips(){ Array.prototype.forEach.call(document.querySelectorAll('.chips'), function(el){ el.remove(); }); }

function addUser(text){
  var row = document.createElement('div');
  row.className = 'row user';
  row.innerHTML =
    '<div class="av bot" style="visibility:hidden"></div>'+
    '<div class="bubble-wrap"><div class="bubble"></div></div>';
  row.querySelector('.bubble').textContent = text;
  stream.appendChild(row); scrollDown();
}
function renderBubble(type, html){
  var row = document.createElement('div');
  row.className = 'row ' + (type==='agent' ? 'agent' : 'bot');
  var av = type==='agent'
    ? '<div class="av agent">R</div>'
    : '<div class="av bot">'+STAR+'</div>';
  var who = type==='agent'
    ? '<div class="who agent-who">Live Agent · Riley</div>'
    : '<div class="who">North Star Bot</div>';
  row.innerHTML = av + '<div class="bubble-wrap">'+who+'<div class="bubble">'+html+'</div></div>';
  stream.appendChild(row); scrollDown();
}
function renderChips(chips){
  if(!chips || !chips.length) return;
  var box = document.createElement('div');
  box.className = 'chips';
  chips.forEach(function(c){
    var b = document.createElement('button');
    b.className = 'chip' + (c.agentExit ? ' agent-exit' : '');
    b.type = 'button';
    b.innerHTML = (c.icon ? ICONS[c.icon] : '') + '<span>' + c.label + '</span>';
    b.addEventListener('click', function(){
      clearChips();
      handleUser(c.value, c.label);
    });
    box.appendChild(b);
  });
  stream.appendChild(box); scrollDown();
}

var queue = [];
var busy = false;
function bot(html, opts){ queue.push({type:'bot', html:html, opts:opts||{}}); runQueue(); }
function agent(html, opts){ queue.push({type:'agent', html:html, opts:opts||{}}); runQueue(); }
function runQueue(){
  if(busy || !queue.length) return;
  busy = true;
  var item = queue.shift();
  var t = document.createElement('div');
  t.className = 'row bot typing';
  t.innerHTML = '<div class="av '+(item.type==='agent'?'agent':'bot')+'">'+(item.type==='agent'?'R':STAR)+'</div>'+
                '<div class="bubble-wrap"><div class="bubble"><span></span><span></span><span></span></div></div>';
  stream.appendChild(t); scrollDown();
  var delay = Math.min(260 + item.html.replace(/<[^>]+>/g,'').length * 9, 900);
  setTimeout(function(){
    t.remove();
    renderBubble(item.type, item.html);
    if(item.opts.chips) renderChips(item.opts.chips);
    busy = false;
    runQueue();
  }, delay);
}

function offerMore(){ bot('Anything else I can help with?', {chips:MAIN_CHIPS}); }
function mainMenu(){
  bot('How can I help you today? Pick an option or just tell me in your own words.', {chips:MAIN_CHIPS});
}

function startTrack(){
  state = 'AWAIT_ORDER';
  bot('Sure — I can look that up. What\'s your <strong>order number</strong>? <br><span style="color:#6d766c;font-size:12.5px">(For this demo, try #111, #222, or #333)</span>',
      {chips:[{icon:'back', label:'Back to menu', value:'menu'}]});
}
function resolveOrder(num){
  if(ORDERS[num]){
    bot(ORDERS[num]);
    if(num === '333'){
      state = 'ORDER_333_FOLLOWUP';
      bot('Did everything arrive in good shape?', {chips:[
        {icon:'check', label:'All good', value:'yes all good'},
        {icon:'alert', label:'There\'s an issue', value:'there is an issue with my delivery'}
      ]});
    } else {
      state = 'MAIN';
      offerMore();
    }
  } else {
    bot('Hmm — <strong>#'+num+'</strong> doesn\'t match an order in our system. That looks like an <strong>invalid order</strong> number. Want to try another one?',
        {chips:[
          {icon:'refresh', label:'Try another number', value:'track my order'},
          {icon:'headset', label:'Talk to a live agent', value:'talk to a live agent'},
          {icon:'back',    label:'Back to menu', value:'menu'}
        ]});
  }
}
function doReturns(){
  state = 'MAIN';
  bot('Here\'s our <strong>return policy</strong>:'+
      '<ul><li><strong>30-day returns</strong></li>'+
      '<li>Items must be <strong>unused</strong></li>'+
      '<li><strong>Original packaging</strong> required</li></ul>'+
      'Start a return here: <a href="'+RETURNS_LINK+'" target="_blank" rel="noopener">northstaroutdoors.com/returns</a>');
  offerMore();
}
function doShipping(){
  state = 'MAIN';
  bot('Here are our <strong>shipping options</strong>:'+
      '<ul><li><strong>Standard</strong> shipping: 3-5 business days</li>'+
      '<li><strong>Expedited</strong> shipping: 1-2 business days</li></ul>');
  offerMore();
}
function startRecommend(){
  state = 'RECOMMEND_Q1';
  recData = {};
  bot('Love it — let\'s get you geared up. First, <strong>what are you heading out to do?</strong>', {chips:[
    {icon:'mountains', label:'Hiking', value:'hiking'},
    {icon:'tent',      label:'Camping', value:'camping'},
    {icon:'snow',      label:'Cold-weather trip', value:'cold weather'},
    {icon:'rain',      label:'Rainy adventure', value:'rain'}
  ]});
}
function recommendCategory(activity, seasonNorm){
  var a = (activity||'').toLowerCase(), cat, label;
  if(/camp|tent|sleep/.test(a)){ label='Camping'; cat='tents, sleeping bags, and camp kitchen gear'; }
  else if(/cold|winter|snow|ski|insulat/.test(a)){ label='Cold-weather'; cat='insulated jackets, base layers, and beanies'; }
  else if(/rain|wet|waterproof/.test(a)){ label='Rain'; cat='waterproof shells and rain gear'; }
  else if(/climb/.test(a)){ label='Climbing'; cat='climbing packs and technical outerwear'; }
  else if(/run/.test(a)){ label='Trail-running'; cat='trail-running shoes and lightweight layers'; }
  else if(/hik|trail|trek|backpack|walk/.test(a)){ label='Hiking'; cat='hiking boots and trail apparel'; }
  else { label='Outdoor'; cat='versatile outdoor apparel and layering essentials'; }
  var mod='';
  if(/warm|summer|hot|mild/.test(seasonNorm)) mod=' I\'d look at breathable, lightweight picks.';
  else if(/cold|winter|snow|freez/.test(seasonNorm)) mod=' Prioritize insulated, cold-rated options.';
  else if(/rain|wet|storm/.test(seasonNorm)) mod=' Go for waterproof, sealed-seam options.';
  else if(/mix|vary|3|three|season|shoulder|any/.test(seasonNorm)) mod=' Versatile 3-season pieces are ideal here.';
  return 'Based on that, I\'d point you toward our <strong>'+cat+'</strong> ('+label+' category).'+mod+' Take a look whenever you\'re ready.';
}
function toLiveAgent(){
  state = 'LIVE_AGENT';
  fallbackCount = 0;
  bot('Connecting you to a live agent…');
  agent(DOT + ' You\'re now connected to a <strong>Live Agent</strong> (simulated). Hi, I\'m Riley from North Star Support — how can I help you today?',
    {chips:[{icon:'back', label:'Return to main menu', value:'main menu', agentExit:true}]});
}

function routeIntent(intent){
  switch(intent){
    case 'track':     startTrack();  return true;
    case 'returns':   doReturns();   return true;
    case 'shipping':  doShipping();  return true;
    case 'recommend': startRecommend(); return true;
    case 'agent':     toLiveAgent(); return true;
    case 'menu':      state='MAIN'; mainMenu(); return true;
    case 'bye':       state='MAIN'; bot('Thanks for stopping by North Star. Stay warm out there!'); return true;
    case 'greeting':  state='MAIN'; bot('Hey there — here\'s what I can help with.', {chips:MAIN_CHIPS}); return true;
    case 'thanks':    bot('Anytime — happy trails.'); return true;
    default: return false;
  }
}
function fallback(){
  fallbackCount++;
  if(fallbackCount >= 2){
    bot('I still didn\'t quite catch that — no worries. Want me to connect you with a live agent, or pick one of these?', {chips:MAIN_CHIPS});
    fallbackCount = 0;
  } else {
    bot('Hmm, I didn\'t quite get that. I can help with a few things — pick one or tell me in your own words:', {chips:MAIN_CHIPS});
  }
}

function handleUser(rawValue, displayText){
  var shown = (displayText !== undefined) ? displayText : rawValue;
  addUser(shown);
  var norm = normalize(rawValue);

  if(state === 'AWAIT_ORDER'){
    var num = extractOrder(norm);
    if(num){ resolveOrder(num); return; }
    var it = classify(norm);
    if(it && it!=='greeting' && it!=='thanks'){ if(routeIntent(it)) return; }
    bot('I just need your <strong>order number</strong> to check the status — it\'s a number like #111. Or head back to the menu.',
        {chips:[{icon:'back', label:'Back to menu', value:'menu'}]});
    return;
  }

  if(state === 'ORDER_333_FOLLOWUP'){
    var it2 = classify(norm);
    if(/\b(no|not|issue|problem|wrong|missing|damaged|broken|help|didnt|never|late)\b/.test(norm) || it2==='agent' || it2==='returns'){
      bot('Sorry to hear that. Let me get a specialist to help sort out your delivered order.');
      toLiveAgent(); return;
    }
    state='MAIN';
    bot('Awesome — glad it arrived safely.');
    offerMore(); return;
  }

  if(state === 'RECOMMEND_Q1'){
    recData.activity = norm;
    state = 'RECOMMEND_Q2';
    bot('Nice choice. And what <strong>conditions</strong> are you expecting out there?', {chips:[
      {icon:'sun',   label:'Warm / summer', value:'warm summer'},
      {icon:'snow',  label:'Cold / winter', value:'cold winter'},
      {icon:'rain',  label:'Rainy / wet', value:'rainy wet'},
      {icon:'cloud', label:'Mixed conditions', value:'mixed conditions'}
    ]});
    return;
  }
  if(state === 'RECOMMEND_Q2'){
    var rec = recommendCategory(recData.activity, norm);
    state = 'MAIN';
    bot(rec);
    offerMore(); return;
  }

  if(state === 'LIVE_AGENT'){
    var it3 = classify(norm);
    if(it3==='menu' || /\b(bot|main menu|end chat|leave chat|back to bot)\b/.test(norm)){
      state='MAIN';
      bot('You\'re back with the North Star Support Bot.');
      mainMenu(); return;
    }
    agent('Thanks for that — noted. A North Star specialist will follow up by email shortly. Anything else I can pass along, or shall I send you back to the menu?',
      {chips:[{icon:'back', label:'Return to main menu', value:'main menu', agentExit:true}]});
    return;
  }

  var intent = classify(norm);
  var orderNum = extractOrder(norm);
  if(orderNum && (intent===null || intent==='track')){
    fallbackCount = 0;
    resolveOrder(orderNum); return;
  }
  if(intent){
    fallbackCount = 0;
    routeIntent(intent); return;
  }
  fallback();
}

function send(){
  var v = input.value.trim();
  if(!v) return;
  input.value = '';
  clearChips();
  handleUser(v);
}
document.getElementById('send').addEventListener('click', send);
input.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ e.preventDefault(); send(); }
});

function boot(){
  stream.innerHTML = '';
  queue = []; busy = false; state = 'MAIN'; fallbackCount = 0; recData = {};
  bot('Hey there — I\'m the <strong>North Star Support Bot</strong>, your guide for orders, returns, and gear. What can I help you with today?',
      {chips:MAIN_CHIPS});
  input.focus();
}
document.getElementById('reset').addEventListener('click', boot);
boot();
</script>
</body>
</html>
